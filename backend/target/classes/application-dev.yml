spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/meetflow?sslmode=disable
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: "postgres"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO

# ─── Departure Reminder Notifications ───────────────────────────────────────────
# Fill in your Twilio credentials below before starting the backend.
# WhatsApp sandbox: recipients must text "join <sandbox-keyword>" to the number first.
meetflow:
  notifications:
    enabled: true
    twilio:
      account-sid: REPLACE_WITH_YOUR_TWILIO_ACCOUNT_SID
      auth-token: REPLACE_WITH_YOUR_TWILIO_AUTH_TOKEN
      whatsapp-from: "whatsapp:+14155238886"   # Twilio sandbox number (or your production number)
