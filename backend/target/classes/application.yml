server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

spring:
  profiles:
    active: dev
  application:
    name: meetflow-backend

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
