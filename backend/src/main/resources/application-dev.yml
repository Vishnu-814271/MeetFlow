spring:
  datasource:
    url: jdbc:h2:mem:meetflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration,classpath:db/seed
    clean-disabled: false
    clean-on-validation-error: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO

# ─── Departure Reminder Notifications ───────────────────────────────────────────
# Disabled by default for local dev. Set to true and fill in Twilio creds to test.
meetflow:
  notifications:
    enabled: false
    twilio:
      account-sid: REPLACE_WITH_YOUR_TWILIO_ACCOUNT_SID
      auth-token: REPLACE_WITH_YOUR_TWILIO_AUTH_TOKEN
      whatsapp-from: "whatsapp:+14155238886"
